<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — Al-Awfa Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A4010;
      --fg: #FBF5DD;
      --muted: #9AA86F;
      --accent: #306D29;
      --accent-dim: rgba(48,109,41,0.2);
      --ufo-body: #C8D0E0;
      --ufo-glow: rgba(48,109,41,0.4);
      --beam: rgba(48,109,41,0.1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ===== STARFIELD ===== */
    .starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: var(--min-o); }
      100% { opacity: var(--max-o); }
    }

    /* Nebula */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .nebula-1 {
      width: 500px; height: 500px;
      top: -10%; right: -5%;
      background: radial-gradient(circle, rgba(48,109,41,0.06) 0%, transparent 70%);
      animation: nebulaPulse 12s ease-in-out infinite alternate;
    }

    .nebula-2 {
      width: 400px; height: 400px;
      bottom: -5%; left: -5%;
      background: radial-gradient(circle, rgba(130,200,80,0.05) 0%, transparent 70%);
      animation: nebulaPulse 15s ease-in-out infinite alternate-reverse;
    }

    .nebula-3 {
      width: 300px; height: 300px;
      top: 40%; left: 40%;
      background: radial-gradient(circle, rgba(48,109,41,0.04) 0%, transparent 70%);
      animation: nebulaPulse 10s ease-in-out infinite alternate;
    }

    @keyframes nebulaPulse {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 1; }
    }

    /* ===== SCROLLING TEXT ===== */
    .scroll-col {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 140px;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .scroll-col--left { left: 0; }
    .scroll-col--right { right: 0; }

    .scroll-track {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 0;
    }

    .scroll-col--left .scroll-track {
      animation: scrollDown var(--speed) linear infinite;
    }

    .scroll-col--right .scroll-track {
      animation: scrollUp var(--speed) linear infinite;
    }

    @keyframes scrollDown {
      0% { transform: translateY(-50%); }
      100% { transform: translateY(0); }
    }

    @keyframes scrollUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .scroll-text {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      white-space: nowrap;
      padding-left: 20px;
      letter-spacing: 4px;
      -webkit-text-stroke: 1px rgba(154,168,111,0.25);
      color: transparent;
      user-select: none;
    }

    .scroll-col--left .scroll-text {
      -webkit-text-stroke-color: rgba(48,109,41,0.15);
    }

    .scroll-col--right .scroll-text {
      -webkit-text-stroke-color: rgba(154,168,111,0.2);
      padding-left: 0;
      padding-right: 20px;
      text-align: right;
      display: block;
    }

    .scroll-text:nth-child(odd) { opacity: 0.5; }
    .scroll-text:nth-child(even) { opacity: 0.3; }
    .scroll-text:nth-child(3n) { opacity: 0.7; }

    /* ===== UFO ===== */
    .ufo-scene {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .ufo {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      animation: ufoFly 8s ease-in-out infinite;
    }

    @keyframes ufoFly {
      0% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      25% { transform: translateX(calc(-50% + 60px)) translateY(-15px) rotate(1deg); }
      50% { transform: translateX(-50%) translateY(5px) rotate(-1deg); }
      75% { transform: translateX(calc(-50% - 60px)) translateY(-10px) rotate(2deg); }
      100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
    }

    .ufo-dome {
      width: 50px; height: 28px;
      background: linear-gradient(180deg, rgba(200,208,224,0.9) 0%, rgba(160,170,190,0.6) 100%);
      border-radius: 50% 50% 10% 10%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      box-shadow: 0 -4px 20px rgba(200,208,224,0.15), inset 0 -8px 16px rgba(0,0,0,0.15);
    }

    .ufo-dome::before {
      content: '';
      position: absolute;
      top: 5px; left: 10px;
      width: 16px; height: 8px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
      transform: rotate(-15deg);
    }

    .ufo-body {
      width: 120px; height: 24px;
      background: linear-gradient(180deg, #B0B8CC 0%, #8A92A8 40%, #6A7290 100%);
      border-radius: 50%;
      margin: -6px auto 0;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 40px var(--ufo-glow);
    }

    .ufo-body::before {
      content: '';
      position: absolute;
      top: 6px; left: 12px; right: 12px;
      height: 3px;
      background: rgba(48,109,41,0.3);
      border-radius: 2px;
      box-shadow: 0 5px 0 rgba(48,109,41,0.15);
    }

    .ufo-lights {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: -4px;
      position: relative;
      z-index: 3;
    }

    .ufo-light {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 16px var(--ufo-glow);
      animation: lightBlink 1.5s ease-in-out infinite;
    }

    .ufo-light:nth-child(2) { animation-delay: 0.2s; }
    .ufo-light:nth-child(3) { animation-delay: 0.4s; }
    .ufo-light:nth-child(4) { animation-delay: 0.6s; }
    .ufo-light:nth-child(5) { animation-delay: 0.8s; }
    .ufo-light:nth-child(6) { animation-delay: 1.0s; }
    .ufo-light:nth-child(7) { animation-delay: 1.2s; }

    @keyframes lightBlink {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .ufo-beam {
      width: 0; height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-top: 120px solid var(--beam);
      margin: -2px auto 0;
      position: relative;
      z-index: 0;
      filter: blur(4px);
      animation: beamPulse 3s ease-in-out infinite;
    }

    .ufo-beam::after {
      content: '';
      position: absolute;
      top: 0; left: -20px; right: -20px;
      height: 100%;
      background: linear-gradient(180deg, rgba(48,109,41,0.06) 0%, transparent 100%);
      filter: blur(8px);
    }

    @keyframes beamPulse {
      0%, 100% { opacity: 0.5; border-top-width: 120px; }
      50% { opacity: 0.9; border-top-width: 140px; }
    }

    .ufo-particles {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 200px;
      pointer-events: none;
    }

    .ufo-particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: particleFall var(--fall-dur) linear infinite;
      animation-delay: var(--fall-delay);
    }

    @keyframes particleFall {
      0% { opacity: 0; transform: translateY(0) scale(1); }
      10% { opacity: 0.8; }
      80% { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(200px) scale(0.3); }
    }

    /* ===== CENTER CONTENT ===== */
    .center-content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 0 160px;
    }

    .error-code {
      font-family: 'Space Mono', monospace;
      font-size: clamp(100px, 18vw, 220px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -4px;
      color: transparent;
      -webkit-text-stroke: 2px rgba(48,109,41,0.25);
      position: relative;
      opacity: 0;
      animation: errorReveal 1s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      user-select: none;
    }

    @keyframes errorReveal {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    .error-code::before,
    .error-code::after {
      content: attr(data-code);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      color: var(--accent);
      -webkit-text-stroke: 0;
      opacity: 0;
    }

    .error-code::before {
      animation: glitch1 4s 1.5s ease-in-out infinite;
    }

    .error-code::after {
      animation: glitch2 4s 1.5s ease-in-out infinite;
    }

    @keyframes glitch1 {
      0%, 90%, 100% { opacity: 0; transform: translate(0); }
      92% { opacity: 0.5; transform: translate(-4px, -2px); clip-path: inset(20% 0 40% 0); }
      94% { opacity: 0.3; transform: translate(4px, 2px); clip-path: inset(60% 0 10% 0); }
      96% { opacity: 0; transform: translate(0); }
    }

    @keyframes glitch2 {
      0%, 88%, 100% { opacity: 0; transform: translate(0); }
      90% { opacity: 0.4; transform: translate(3px, 1px); clip-path: inset(40% 0 20% 0); }
      93% { opacity: 0.2; transform: translate(-3px, -1px); clip-path: inset(10% 0 60% 0); }
      95% { opacity: 0; transform: translate(0); }
    }

    .error-message {
      text-align: center;
      margin-top: 16px;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .error-title {
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .error-desc {
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto 36px;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: 1px solid rgba(48,109,41,0.3);
      border-radius: 12px;
      background: rgba(48,109,41,0.08);
      color: var(--fg);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      pointer-events: auto;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .error-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      border-radius: 12px;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: -1;
    }

    .error-btn:hover {
      color: var(--fg);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(48,109,41,0.2);
    }

    .error-btn:hover::before {
      transform: scaleX(1);
    }

    .error-btn:active {
      transform: scale(0.96);
    }

    .error-btn .btn-arrow {
      transition: transform 0.3s ease;
    }

    .error-btn:hover .btn-arrow {
      transform: translateX(4px);
    }

    /* ===== SHOOTING STARS ===== */
    .shooting-star {
      position: fixed;
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.6), transparent);
      border-radius: 1px;
      z-index: 1;
      opacity: 0;
      animation: shoot var(--shoot-dur) linear infinite;
      animation-delay: var(--shoot-delay);
      transform-origin: left center;
    }

    @keyframes shoot {
      0% { opacity: 0; transform: translate(0, 0) rotate(var(--shoot-angle)); }
      5% { opacity: 1; }
      15% { opacity: 0; }
      100% { opacity: 0; transform: translate(var(--shoot-dist), 0) rotate(var(--shoot-angle)); }
    }

    /* ===== SCANLINES ===== */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .scroll-col { width: 80px; }
      .scroll-text { font-size: 14px; letter-spacing: 2px; padding-left: 12px; }
      .scroll-col--right .scroll-text { padding-left: 0; padding-right: 12px; }
      .center-content { padding: 0 100px; }
      .ufo-body { width: 90px; height: 18px; }
      .ufo-dome { width: 38px; height: 22px; }
      .ufo-beam { border-left-width: 30px; border-right-width: 30px; }
      .ufo-light { width: 4px; height: 4px; gap: 6px; }
    }

    @media (max-width: 480px) {
      .scroll-col { width: 56px; }
      .scroll-text { font-size: 11px; letter-spacing: 1px; padding-left: 8px; }
      .scroll-col--right .scroll-text { padding-right: 8px; }
      .center-content { padding: 0 68px; }
      .ufo { top: 8%; }
      .ufo-body { width: 70px; height: 14px; }
      .ufo-dome { width: 30px; height: 18px; }
      .ufo-lights { gap: 5px; }
      .ufo-light { width: 3px; height: 3px; }
      .ufo-beam { border-left-width: 22px; border-right-width: 22px; border-top-width: 80px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.15s !important;
      }
      .error-code, .error-message, .error-btn {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Starfield -->
  <div class="starfield" id="starfield" aria-hidden="true"></div>

  <!-- Nebula -->
  <div class="nebula nebula-1" aria-hidden="true"></div>
  <div class="nebula nebula-2" aria-hidden="true"></div>
  <div class="nebula nebula-3" aria-hidden="true"></div>

  <!-- Shooting Stars -->
  <div id="shooting-stars" aria-hidden="true"></div>

  <!-- Scrolling Text -->
  <div class="scroll-col scroll-col--left" aria-hidden="true">
    <div class="scroll-track" style="--speed: 12s;" id="track-left"></div>
  </div>

  <div class="scroll-col scroll-col--right" aria-hidden="true">
    <div class="scroll-track" style="--speed: 16s;" id="track-right"></div>
  </div>

  <!-- UFO -->
  <div class="ufo-scene" aria-hidden="true">
    <div class="ufo">
      <div class="ufo-dome"></div>
      <div class="ufo-body"></div>
      <div class="ufo-lights">
        <div class="ufo-light"></div><div class="ufo-light"></div>
        <div class="ufo-light"></div><div class="ufo-light"></div>
        <div class="ufo-light"></div><div class="ufo-light"></div>
        <div class="ufo-light"></div>
      </div>
      <div class="ufo-beam"></div>
      <div class="ufo-particles" id="ufo-particles"></div>
    </div>
  </div>

  <!-- Center Content -->
  <div class="center-content">
    <div class="error-code" id="errorCode" data-code="404">404</div>
    <div class="error-message">
      <h1 class="error-title" id="errorTitle">Halaman Tidak Ditemukan</h1>
      <p class="error-desc" id="errorDesc">
        Sepertinya halaman yang Anda cari sudah diangkut ke luar angkasa. Mungkin UFO di atas tahu ke mana perginya.
      </p>
      <a href="/" class="error-btn" role="button">
        Kembali ke Beranda
        <span class="btn-arrow" aria-hidden="true"><i class="fa-solid fa-arrow-right"></i></span>
      </a>
    </div>
  </div>

  <!-- Scanlines -->
  <div class="scanlines" aria-hidden="true"></div>

  <script>
    /* ===== READ URL PARAMS ===== */
    const params = new URLSearchParams(window.location.search)
    const code = params.get('code') || '404'
    const title = params.get('title') || (
      code === '404' ? 'Halaman Tidak Ditemukan' :
      code === '500' ? 'Kesalahan Server' :
      code === '0' ? 'Anda Sedang Offline' :
      'Terjadi Kesalahan'
    )
    const desc = params.get('desc') || (
      code === '404' ? 'Sepertinya halaman yang Anda cari sudah diangkut ke luar angkasa. Mungkin UFO di atas tahu ke mana perginya.' :
      code === '500' ? 'Roket kami mengalami gangguan teknis. Tim kami sudah diberitahu dan akan segera memperbaikinya.' :
      code === '0' ? 'Sambungan ke bumi terputus. Periksa koneksi internet Anda dan coba lagi.' :
      'Sesuatu yang tidak terduga terjadi. Silakan coba lagi.'
    )

    document.getElementById('errorCode').textContent = code
    document.getElementById('errorCode').setAttribute('data-code', code)
    document.getElementById('errorTitle').textContent = title
    document.getElementById('errorDesc').textContent = desc

    /* ===== GENERATE STARS ===== */
    const starfield = document.getElementById('starfield')
    for (let i = 0; i < 180; i++) {
      const star = document.createElement('div')
      star.className = 'star'
      const size = Math.random() * 2 + 0.5
      star.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
        --dur: ${Math.random() * 3 + 2}s;
        --min-o: ${Math.random() * 0.2 + 0.1};
        --max-o: ${Math.random() * 0.5 + 0.4};
        animation-delay: ${Math.random() * 5}s;
      `
      starfield.appendChild(star)
    }

    /* ===== GENERATE SCROLLING TEXT ===== */
    const trackLeft = document.getElementById('track-left')
    const trackRight = document.getElementById('track-right')
    const scrollLines = 20
    const leftText = params.get('leftText') || code

    for (let i = 0; i < scrollLines * 2; i++) {
      const s = document.createElement('span')
      s.className = 'scroll-text'
      s.textContent = leftText
      trackLeft.appendChild(s)
    }

    const rightText = params.get('rightText') || (
      code === '404' ? 'NOT FOUND' :
      code === '500' ? 'SERVER ERROR' :
      code === '0' ? 'OFFLINE' :
      'ERROR'
    )

    for (let i = 0; i < scrollLines * 2; i++) {
      const s = document.createElement('span')
      s.className = 'scroll-text'
      s.textContent = rightText
      trackRight.appendChild(s)
    }

    /* ===== GENERATE UFO PARTICLES ===== */
    const particleContainer = document.getElementById('ufo-particles')
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div')
      p.className = 'ufo-particle'
      const xPos = Math.random() * 60 + 10
      p.style.cssText = `
        left: ${xPos}px; top: 0;
        --fall-dur: ${Math.random() * 2 + 1.5}s;
        --fall-delay: ${Math.random() * 3}s;
      `
      particleContainer.appendChild(p)
    }

    /* ===== GENERATE SHOOTING STARS ===== */
    const shootingContainer = document.getElementById('shooting-stars')
    for (let i = 0; i < 5; i++) {
      const s = document.createElement('div')
      s.className = 'shooting-star'
      s.style.cssText = `
        top: ${Math.random() * 40 + 5}%; left: ${Math.random() * 60 + 10}%;
        --shoot-dur: ${Math.random() * 4 + 6}s;
        --shoot-delay: ${Math.random() * 8 + i * 2}s;
        --shoot-angle: ${Math.random() * 20 + 25}deg;
        --shoot-dist: ${Math.random() * 300 + 200}px;
        width: ${Math.random() * 60 + 40}px;
      `
      shootingContainer.appendChild(s)
    }

    /* ===== UFO PARALLAX ===== */
    const ufo = document.querySelector('.ufo')
    if (window.matchMedia('(pointer: fine)').matches) {
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 2
        const y = (e.clientY / window.innerHeight - 0.5) * 2
        ufo.style.marginLeft = `${x * 20}px`
        ufo.style.marginTop = `${y * 10}px`
      })
    }
  </script>
</body>
</html>
