<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Al-Awfa Digital Product</title>
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/admin.css" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Admin Panel</h2>
        <button class="theme-toggle sidebar-theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/" class="active" data-page="overview">Overview</a>
        <a href="/admin/?page=produk" data-page="produk">Produk</a>
        <a href="/admin/?page=tambah" data-page="tambah">Tambah Produk</a>
        <a href="/admin/?page=logout" data-page="logout">Logout</a>
      </nav>
    </aside>

    <main class="dashboard-content" id="dashboardContent">
      <section class="stats-overview" id="statsOverview">
        <div class="stat-card">
          <h3>Total Produk</h3>
          <p class="stat-number" id="statTotalProducts">0</p>
        </div>
        <div class="stat-card">
          <h3>Total Views</h3>
          <p class="stat-number" id="statTotalViews">0</p>
        </div>
        <div class="stat-card">
          <h3>Total Clicks</h3>
          <p class="stat-number" id="statTotalClicks">0</p>
        </div>
        <div class="stat-card">
          <h3>Rata-rata CTR</h3>
          <p class="stat-number" id="statAvgCtr">0%</p>
        </div>
      </section>

      <section class="product-table-section" id="productTableSection">
        <h2>Daftar Produk</h2>
        <div class="table-wrapper">
          <table class="product-table">
            <thead>
              <tr>
                <th>Foto</th>
                <th>Judul</th>
                <th>Views</th>
                <th>Clicks</th>
                <th>CTR</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="productTableBody">
              <tr><td colspan="6">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/scripts/theme.js"></script>
  <script type="module" src="/scripts/admin.js"></script>
</body>
</html>
