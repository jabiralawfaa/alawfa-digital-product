<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Al-Awfa Digital Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/admin-login.css" />
</head>
<body class="login-body">
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/logo.png" alt="Al-Awfa Digital Product" class="login-logo" />
        <h1>Admin Login</h1>
        <p>Masukkan password untuk mengakses dashboard</p>
      </div>
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Masukkan password admin" required autofocus />
        </div>
        <button type="submit" class="btn-primary btn-login">Masuk</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </main>
  <script type="module" src="/scripts/theme.js"></script>
  <script type="module" src="/scripts/admin-login.js"></script>
</body>
</html>
